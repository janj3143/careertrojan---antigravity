# ============================================================================
# CareerTrojan CI — Test + Entire.io Checkpoint
# ============================================================================
# Runs on every push/PR: lint, test, and capture Entire.io session context
# so every commit carries the full reasoning behind the change.
# ============================================================================

name: CI — Test & Track

on:
  push:
    branches: [main, develop, "feature/**", "phase/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run unit + integration tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            -x --timeout=120 \
            2>&1 | tee test-output.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-output.txt

  # ── Entire.io — Code Context Tracking ────────────────────────────────────
  entire-checkpoint:
    name: Entire.io checkpoint
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Entire to link sessions to commits

      - name: Install Entire CLI
        run: curl -fsSL https://entire.io/install.sh | bash

      - name: Entire checkpoint
        run: entire checkpoint
        env:
          ENTIRE_TOKEN: ${{ secrets.ENTIRE_TOKEN }}

  # ── Docker build check ──────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build images (no push)
        run: docker compose build --no-cache
