name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements.runtime.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          pytest tests/ --cov=shared_backend --cov=services --cov-report=xml --cov-report=term

  entire-checkpoint:
    name: Entire.io checkpoint
    runs-on: ubuntu-latest
    needs: test
    if: success() || failure()
    steps:
      - uses: actions/checkout@v4

      - name: Install Entire CLI
        run: curl -fsSL https://entire.io/install.sh | bash

      - name: Entire checkpoint
        run: |
          entire checkpoint \
            --meta branch=${{ github.ref_name }} \
            --meta sha=${{ github.sha }} \
            --meta run_id=${{ github.run_id }}
        env:
          ENTIRE_TOKEN: ${{ secrets.ENTIRE_TOKEN }}
