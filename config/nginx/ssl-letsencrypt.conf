# ============================================================================
# CareerTrojan — Production NGINX + Let's Encrypt SSL
# ============================================================================
# Docker project: antigravity-careertrojan
# Model: Host NGINX terminates SSL → proxies to Docker containers on 127.0.0.1
#
# Port map (compose.production.yaml):
#   8700  backend-api     FastAPI / uvicorn
#   8701  admin-portal    /admin/*
#   8702  user-portal     / (default)
#   8703  mentor-portal   /mentor/*
#
# Single SAN certificate covering all 3 domains:
#   careertrojan.com  (primary)
#   careertrojan.co.uk  → redirects to .com
#   careertrojan.org    → redirects to .com
#
# PREREQUISITES:
#   1. DNS A records for all 6 hostnames → Hetzner public IP
#   2. UFW: allow TCP 80, 443 inbound
#   3. sudo apt install nginx certbot python3-certbot-nginx
#   4. Issue cert:
#        sudo certbot --nginx \
#          -d careertrojan.com -d www.careertrojan.com \
#          -d careertrojan.co.uk -d www.careertrojan.co.uk \
#          -d careertrojan.org -d www.careertrojan.org
#   5. Enable auto-renewal:
#        sudo systemctl enable certbot.timer
#        sudo certbot renew --dry-run
#
# Deploy: sudo cp ssl-letsencrypt.conf /etc/nginx/sites-available/careertrojan
#         sudo ln -sf /etc/nginx/sites-available/careertrojan /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ─── Redirect .co.uk and .org → .com (HTTPS) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name careertrojan.co.uk www.careertrojan.co.uk
                careertrojan.org www.careertrojan.org;

    ssl_certificate     /etc/letsencrypt/live/careertrojan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careertrojan.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 301 https://careertrojan.com$request_uri;
}

# ─── HTTP redirect for .co.uk/.org ───────────────────────────────────────────
server {
    listen 80;
    server_name careertrojan.co.uk www.careertrojan.co.uk
                careertrojan.org www.careertrojan.org;
    return 301 https://careertrojan.com$request_uri;
}

# ─── Upstreams (compose.production.yaml → 127.0.0.1 ports) ─────────────────
upstream careertrojan_api {
    server 127.0.0.1:8700;
}

upstream careertrojan_user {
    server 127.0.0.1:8702;
}

upstream careertrojan_admin {
    server 127.0.0.1:8701;
}

upstream careertrojan_mentor {
    server 127.0.0.1:8703;
}

# ─── Primary domain: careertrojan.com ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name careertrojan.com www.careertrojan.com;

    ssl_certificate     /etc/letsencrypt/live/careertrojan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/careertrojan.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── CORS (for API) ───────────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https://careertrojan\.(com|co\.uk|org)$") {
        set $cors_origin $http_origin;
    }

    # ── API routes → FastAPI backend ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://careertrojan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # CORS headers for API
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Timeouts for long AI operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket support (if needed for real-time features) ─────────────────
    location /ws/ {
        proxy_pass http://careertrojan_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── OpenAPI docs ─────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://careertrojan_api;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://careertrojan_api;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://careertrojan_api;
        proxy_set_header Host $host;
    }

    # ── Admin Portal (/admin) ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://careertrojan_admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = /admin/index.html;
    }

    # ── Mentor Portal (/mentor) ──────────────────────────────────────────────
    location /mentor/ {
        proxy_pass http://careertrojan_mentor/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SPA fallback
        proxy_intercept_errors on;
        error_page 404 = /mentor/index.html;
    }

    # ── User Portal (/ default) ──────────────────────────────────────────────
    location / {
        proxy_pass http://careertrojan_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SPA fallback — let React router handle client-side routes
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── Static assets caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://careertrojan_user;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Let's Encrypt challenge ──────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ─── Force HTTP → HTTPS on .com ─────────────────────────────────────────────
server {
    listen 80;
    server_name careertrojan.com www.careertrojan.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://careertrojan.com$request_uri;
    }
}
