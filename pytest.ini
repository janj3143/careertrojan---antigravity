[pytest]
minversion = 7.0
addopts = -q --disable-warnings --tb=short -m "not slow and not live_server"
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (may need DB/Redis)
    e2e: End-to-end tests (full stack)
    slow: Slow tests skipped by default (gazetteer scans, etc.)
    live_server: Tests requiring a running backend (not for CI)
filterwarnings =
    ignore::DeprecationWarning
